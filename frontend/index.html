<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NovaCura Analytics — Clinical Trial Pre-screening</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="branding">
      <img src="images/NovaCura.png" alt="NovaCura logo" class="logo" />
      <div class="brand-text">
        <p class="tagline">Clinical Trial Pre-screening &amp; Candidate Ranking</p>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <form id="demoForm" class="form" aria-label="Ranking form">
        <div class="field">
          <label for="conditionSelect">Condition</label>
          <select id="conditionSelect" name="condition">
            <option value="type 2 diabetes">Type II Diabetes</option>
            <option value="cancer">Cancer (Oncology)</option>
          </select>
        </div>

        <div class="field">
          <label for="topN">Top N candidates</label>
          <input id="topN" name="topN" type="number" min="1" max="100" value="5" placeholder="e.g., 5" />
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="rankBtn">Rank Candidates</button>
          <button type="button" class="btn btn-secondary" id="trainBtn">Train Model</button>
        </div>
      </form>

      <div id="message" class="message" aria-live="polite"></div>
      <div id="trialInfo" class="trial-info" aria-live="polite"></div>
      <div id="results" class="results" aria-live="polite"></div>
      <div id="metricsPanel" class="metrics-panel" aria-live="polite"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
