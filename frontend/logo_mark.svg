<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64" role="img" aria-label="NovaCura logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="ds" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- symbol -->
  <g transform="translate(8,6)">
    <rect width="52" height="52" rx="10" fill="url(#g)" filter="url(#ds)"/>
    <g transform="translate(12,10)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 26 L8 14 L14 26 L20 10 L26 26 L34 18 L42 26"/>
      <path d="M14 30 L22 38 L38 18" stroke-width="3.5"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(76,40)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#091426">Nova</text>
    <text x="52" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#06b6d4">Cura</text>
    <text x="0" y="18" font-family="Inter, Arial, Helvetica, sans-serif" font-size="11" fill="#5b6b7a">Clinical Trial Pre‑screening</text>
  </g>
</svg>
