<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NovaCura mark">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#g)" filter="url(#s)" />

  <!-- abstract pulse + check mark symbol (white) -->
  <g transform="translate(8,8) scale(0.75)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- pulse / waveform -->
    <path d="M6 28 L12 16 L18 28 L24 12 L30 28 L36 20 L42 28" />
    <!-- check overlay (subtle, centered) -->
    <path d="M18 34 L26 42 L46 18" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- small white accent circle for balance -->
  <circle cx="50" cy="14" r="3" fill="#ffffff" opacity="0.12" />
</svg>
